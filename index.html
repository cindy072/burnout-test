<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAT-12 소진 유형 자가진단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid rgba(226, 232, 240, 1); }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div id="app" class="w-full max-w-2xl">
        <!-- Start Screen -->
        <div id="start-screen" class="glass-card p-8 text-center shadow-xl">
            <div class="mb-6 inline-flex p-4 bg-indigo-100 rounded-full text-indigo-600">
                <i class="fas fa-heart-pulse text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">나의 소진(Burnout) 유형 찾기</h1>
            <p class="text-gray-600 mb-8 leading-relaxed">
                BAT-12(Burnout Assessment Tool)는 유럽의 소진 연구자 Schaufeli 등이 개발하고 한국어 타당화 연구를 거친 과학적인 도구입니다. 12개의 문항을 통해 당신의 마음 상태를 진단해보세요.
            </p>
            <button onclick="startTest()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition shadow-lg">
                테스트 시작하기
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span id="progress-text" class="text-sm font-semibold text-indigo-600">문항 1 / 12</span>
                    <span id="category-badge" class="px-3 py-1 bg-gray-200 text-gray-700 text-xs rounded-full font-medium">영역 이름</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full progress-bar" style="width: 8.33%"></div>
                </div>
            </div>

            <div class="glass-card p-8 shadow-xl">
                <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-8 leading-snug">질문 내용이 여기에 표시됩니다.</h2>
                
                <div class="space-y-3">
                    <div class="flex flex-col space-y-2" id="options-container">
                        <!-- Options generated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden">
            <div class="glass-card p-8 shadow-xl mb-6">
                <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">당신의 진단 결과</h2>
                <div id="status-label" class="text-center font-semibold text-red-500 mb-8">상태 요약</div>
                
                <div class="space-y-6 mb-8">
                    <div id="chart-container" class="space-y-4">
                        <!-- Score bars generated by JS -->
                    </div>
                </div>

                <div class="border-t pt-8">
                    <h3 class="text-lg font-bold text-indigo-600 mb-3"><i class="fas fa-stethoscope mr-2"></i>주요 소진 유형: <span id="main-type">타입명</span></h3>
                    <div id="type-description" class="text-gray-700 leading-relaxed mb-6 bg-indigo-50 p-4 rounded-lg">
                        설명 내용
                    </div>
                    
                    <h3 class="text-lg font-bold text-green-600 mb-3"><i class="fas fa-pills mr-2"></i>심리적 처방전</h3>
                    <ul id="prescription-list" class="space-y-2 text-gray-700 list-disc pl-5">
                        <!-- Prescriptions -->
                    </ul>
                </div>

                <button onclick="location.reload()" class="w-full mt-10 py-3 border-2 border-gray-300 text-gray-600 font-bold rounded-xl hover:bg-gray-50 transition">
                    다시 테스트하기
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { text: "직장에서 일을 할 때 정신적으로나 신체적으로나 완전히 지쳤다고 느낀다.", cat: "탈진" },
            { text: "아침에 일어나면 출근할 생각에 에너지가 전혀 남아 있지 않음을 느낀다.", cat: "탈진" },
            { text: "직장에서 일하는 동안 거의 아무것도 느끼지 못할 정도로 무감각해졌다.", cat: "탈진" },
            { text: "나의 일이 어떤 의미도 없다고 느껴질 때가 많다.", cat: "심적 거리" },
            { text: "일할 때 사람들에게 냉소적으로 대하거나 거리를 두게 된다.", cat: "심적 거리" },
            { text: "직장 업무가 나에게 전혀 중요하지 않게 느껴진다.", cat: "심적 거리" },
            { text: "직장에서 업무에 집중하는 것이 어렵다고 느낀다.", cat: "인지적 조절 손상" },
            { text: "업무를 수행할 때 자꾸 실수하게 되거나 집중력이 흐트러진다.", cat: "인지적 조절 손상" },
            { text: "기억력이 예전 같지 않고, 업무상의 세세한 것들을 잊어버리곤 한다.", cat: "인지적 조절 손상" },
            { text: "업무 중 사소한 일에도 쉽게 짜증이 나거나 화가 난다.", cat: "정서적 조절 손상" },
            { text: "나도 모르게 감정적으로 격해져서 직장 동료에게 화를 낼 때가 있다.", cat: "정서적 조절 손상" },
            { text: "평소보다 감정 기복이 심해진 것을 느낀다.", cat: "정서적 조절 손상" }
        ];

        // 수정된 5점 리커트 척도 보기
        const options = [
            { label: "전혀 아니다", value: 1 },
            { label: "거의 아니다", value: 2 },
            { label: "때때로 그렇다", value: 3 },
            { label: "자주 그렇다", value: 4 },
            { label: "항상 그렇다", value: 5 }
        ];

        const prescriptions = {
            "탈진": {
                desc: "당신은 현재 극심한 에너지 소모 상태입니다. 휴식이 선택이 아닌 필수인 단계입니다.",
                tips: ["주말에는 업무 관련 기기를 완전히 끄는 '디지털 디톡스'를 하세요.", "수면의 질을 높이기 위해 자기 전 가벼운 스트레칭을 실천하세요.", "하루 20분만이라도 업무와 무관한 조용한 산책을 즐기세요."]
            },
            "심적 거리": {
                desc: "일과의 관계가 단절된 상태입니다. 업무의 '의미'보다 '나 자신'에 집중할 때입니다.",
                tips: ["일과 나를 분리하는 연습을 하세요. 퇴근 후에는 '나만의 부캐' 활동을 만드세요.", "업무 중 동료와의 짧은 커피 타임 등 긍정적인 관계를 소량이라도 만드세요.", "현재 내가 얻고 있는 현실적 보상(경제적 이득 등)에 집중하며 심적 부담을 덜어보세요."]
            },
            "인지적 조절 손상": {
                desc: "뇌가 과부하되어 효율이 떨어진 상태입니다. 업무의 양을 조절하고 단순화해야 합니다.",
                tips: ["한 번에 한 가지 일만 하세요(Single-tasking).", "중요한 정보는 즉시 메모하여 뇌의 기억 부담을 줄여주세요.", "일을 시작하기 전 5분간 명상을 통해 뇌를 정돈하세요."]
            },
            "정서적 조절 손상": {
                desc: "감정의 둑이 낮아진 상태입니다. 부정적 감정이 타인에게 향하기 전에 스스로를 돌봐야 합니다.",
                tips: ["감정이 격해질 때 '6초 참기' 혹은 심호흡을 통해 즉각적인 반응을 늦추세요.", "감정 일기를 통해 마음의 응어리를 글로 배출해보세요.", "비타민 섭취나 충분한 수면 등 신체적 컨디션을 관리하여 예민함을 낮추세요."]
            }
        };

        let currentIdx = 0;
        let scores = { "탈진": 0, "심적 거리": 0, "인지적 조절 손상": 0, "정서적 조절 손상": 0 };

        function startTest() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `문항 ${currentIdx + 1} / 12`;
            document.getElementById('category-badge').innerText = q.cat;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 12) * 100}%`;
            document.getElementById('question-text').innerText = q.text;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-gray-100 hover:border-indigo-400 hover:bg-indigo-50 transition font-medium text-gray-700 shadow-sm";
                btn.innerText = opt.label;
                btn.onclick = () => selectOption(q.cat, opt.value);
                container.appendChild(btn);
            });
        }

        function selectOption(category, value) {
            scores[category] += value;
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const container = document.getElementById('chart-container');
            container.innerHTML = '';
            
            let maxCat = "탈진";
            let maxVal = 0;
            let totalAvg = 0;

            for (const [cat, score] of Object.entries(scores)) {
                const avg = score / 3; 
                totalAvg += avg;
                if (avg > maxVal) {
                    maxVal = avg;
                    maxCat = cat;
                }

                const barWrap = document.createElement('div');
                const percent = (avg / 5) * 100;
                const color = avg >= 4 ? 'bg-red-500' : (avg >= 3 ? 'bg-yellow-500' : 'bg-green-500');
                
                barWrap.innerHTML = `
                    <div class="flex justify-between text-sm mb-1">
                        <span class="font-bold text-gray-700">${cat}</span>
                        <span class="font-mono font-bold">${avg.toFixed(1)} / 5.0</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div class="h-3 rounded-full ${color}" style="width: ${percent}%"></div>
                    </div>
                `;
                container.appendChild(barWrap);
            }

            const overallAvg = totalAvg / 4;
            const statusLabel = document.getElementById('status-label');
            if (overallAvg >= 3.5) {
                statusLabel.innerText = "위험: 현재 심각한 소진 상태입니다. 적극적인 휴식과 전문가 상담이 권장됩니다.";
                statusLabel.className = "text-center font-bold text-red-600 mb-8";
            } else if (overallAvg >= 2.5) {
                statusLabel.innerText = "주의: 소진이 진행 중입니다. 일상의 속도를 늦추고 관리가 필요한 시점입니다.";
                statusLabel.className = "text-center font-bold text-orange-500 mb-8";
            } else {
                statusLabel.innerText = "양호: 소진 정도가 낮으며 에너지를 잘 유지하고 있습니다.";
                statusLabel.className = "text-center font-bold text-green-600 mb-8";
            }

            document.getElementById('main-type').innerText = maxCat;
            document.getElementById('type-description').innerText = prescriptions[maxCat].desc;
            
            const list = document.getElementById('prescription-list');
            list.innerHTML = '';
            prescriptions[maxCat].tips.forEach(tip => {
                const li = document.createElement('li');
                li.innerText = tip;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
